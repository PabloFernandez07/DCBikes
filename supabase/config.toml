[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["https://localhost:5173"]
jwt_expiry = 3600
enable_signup = false

# ─────────────────────────────────────────────────────────────────
# verify_jwt por función (auditoría V5 — fix deploy)
# Funciones invocadas SIN JWT de plataforma: webhooks externos (Redsys),
# recursos públicos (img proxy) y crons (pg_cron / monitor con su propio
# secreto). Su seguridad se basa en firma HMAC / CRON_SECRET / token, no
# en el JWT de Supabase. El resto de funciones mantiene verify_jwt=true.
# ─────────────────────────────────────────────────────────────────
[functions.redsys-notification]
verify_jwt = false

[functions.google-avatar-proxy]
verify_jwt = false

[functions.order-auto-cancel]
verify_jwt = false

[functions.data-retention-cron]
verify_jwt = false

[functions.cron-healthcheck]
verify_jwt = false

[functions.verifactu-send-cron]
verify_jwt = false

# ─────────────────────────────────────────────────────────────────
# Funciones SOLO internas (auditoría V5 — fix email).
# Se invocan vía supabase.functions.invoke con cabecera x-internal-secret
# desde otras Edge Functions (order-place, redsys-notification, order-accept,
# request-payment-otp, customer-magic-link-request, quote-submit, etc.).
#
# Desde la migración de claves de Supabase, el runtime inyecta como
# SUPABASE_SERVICE_ROLE_KEY la nueva secret key `sb_secret_...`, que NO es un
# JWT. Con verify_jwt=true el gateway rechazaba el Bearer con 401 ANTES de
# llegar al handler → no se enviaba ningún email. Su seguridad real es el
# header x-internal-secret (verifyInternalSecret, timing-safe, fail-closed),
# no el JWT de plataforma. Por eso verify_jwt=false.
#
# NOTA: send-reply-email NO va aquí — lo invoca el admin desde el navegador
# con su JWT real (auth.getUser + check is_admin), así que mantiene verify_jwt=true.
# ─────────────────────────────────────────────────────────────────
[functions.generate-order-contract]
verify_jwt = false

[functions.send-customer-magic-link]
verify_jwt = false

[functions.send-order-accepted-customer]
verify_jwt = false

[functions.send-order-address-changed-admin]
verify_jwt = false

[functions.send-order-auto-cancelled]
verify_jwt = false

[functions.send-order-cancelled-by-customer-admin]
verify_jwt = false

[functions.send-order-cancelled-by-customer-confirmation]
verify_jwt = false

[functions.send-order-confirmation-customer]
verify_jwt = false

[functions.send-order-new-admin]
verify_jwt = false

[functions.send-order-ready-pickup]
verify_jwt = false

[functions.send-order-rejected-customer]
verify_jwt = false

[functions.send-order-shipped]
verify_jwt = false

[functions.send-payment-otp]
verify_jwt = false

[functions.send-quote-email]
verify_jwt = false

[functions.generate-invoice-pdf]
verify_jwt = false
